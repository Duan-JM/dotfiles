name: financial-company-warzoom

on:
  pull_request:
    paths:
      - "ai-settings/warzooms/financial-company-warzoom/**"
      - ".github/workflows/financial-company-warzoom.yml"
  push:
    branches:
      - master
    paths:
      - "ai-settings/warzooms/financial-company-warzoom/**"
      - ".github/workflows/financial-company-warzoom.yml"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-settings/warzooms/financial-company-warzoom
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - run: make verify
