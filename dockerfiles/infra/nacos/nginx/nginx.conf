worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # 8848 - passthrough all requests to nacos
    server {
        listen 8848;
        server_name _;

        location / {
            proxy_pass http://nacos:8848;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

    # 8080 - block /actuator, allow everything else
    server {
        listen 8080;
        server_name _;

        location /actuator {
            return 403;
        }

        location / {
            proxy_pass http://nacos:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
