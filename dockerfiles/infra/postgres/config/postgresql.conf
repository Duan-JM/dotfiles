# Enterprise-oriented PostgreSQL defaults for a single primary node.
# Tune memory and connection limits for the actual host size before production traffic.

listen_addresses = '*'
port = 5432
max_connections = 200

# Authentication and encryption
password_encryption = scram-sha-256

# Memory
shared_buffers = 256MB
effective_cache_size = 1GB
work_mem = 8MB
maintenance_work_mem = 128MB
huge_pages = off

# WAL, replication, and point-in-time recovery
wal_level = replica
fsync = on
synchronous_commit = on
full_page_writes = on
wal_compression = on
wal_log_hints = on
max_wal_size = 4GB
min_wal_size = 1GB
wal_keep_size = 1GB
max_wal_senders = 10
max_replication_slots = 10
hot_standby = on
archive_mode = on
archive_timeout = 60s
archive_command = 'test ! -f /var/lib/postgresql/wal_archive/%f && cp %p /var/lib/postgresql/wal_archive/%f'

# Checkpoints
checkpoint_timeout = 15min
checkpoint_completion_target = 0.9

# Query planning
random_page_cost = 1.1
effective_io_concurrency = 200

# Observability
shared_preload_libraries = 'pg_stat_statements'
pg_stat_statements.max = 10000
pg_stat_statements.track = all
track_io_timing = on
track_wal_io_timing = on
track_activity_query_size = 4096

# Logging to Docker stdout/stderr
logging_collector = off
log_destination = 'stderr'
log_timezone = 'Asia/Shanghai'
timezone = 'Asia/Shanghai'
log_line_prefix = '%m [%p] %u@%d %r %a '
log_min_duration_statement = 1000
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on
deadlock_timeout = 1s

# Autovacuum
autovacuum = on
autovacuum_max_workers = 5
autovacuum_naptime = 30s
autovacuum_vacuum_scale_factor = 0.05
autovacuum_analyze_scale_factor = 0.02

# Locale and formatting
lc_messages = 'C'
lc_monetary = 'C'
lc_numeric = 'C'
lc_time = 'C'

