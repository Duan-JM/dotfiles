# redis.conf

# 绑定地址：对外提供服务时，可根据需要设置
bind 0.0.0.0

# 端口号
port 6379

# 设置密码（取消注释并设置一个强密码）
# requirepass yourpassword

# 是否在后台运行
daemonize no

# 日志级别：debug, verbose, notice, warning
loglevel notice

# 持久化设置
# RDB 持久化：默认即可
save 900 1
save 300 10
save 60 10000

# AOF 持久化：建议开启，提高数据安全
appendonly yes
appendfilename "appendonly.aof"

# 设置数据文件和 AOF 文件保存目录
dir /data

# 客户端空闲超时（单位：秒，0 表示不超时）
timeout 0

# 最大内存策略：可根据需求开启
# maxmemory 256mb
# maxmemory-policy allkeys-lru
