# Redis single-node operations profile.
# Secrets are injected by docker-compose command arguments, not stored in this file.

bind 0.0.0.0
port 6379
protected-mode yes
daemonize no
supervised no

loglevel notice
databases 16
tcp-backlog 511
tcp-keepalive 300
timeout 0

dir /data
dbfilename dump.rdb
rdbcompression yes
rdbchecksum yes
save 900 1
save 300 10
save 60 10000
stop-writes-on-bgsave-error yes

appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
aof-use-rdb-preamble yes

lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes
replica-lazy-flush yes

slowlog-log-slower-than 10000
slowlog-max-len 256
latency-monitor-threshold 100

# Set these after sizing the host. Leaving maxmemory unset avoids accidental eviction.
# maxmemory 256mb
# maxmemory-policy allkeys-lru

rename-command FLUSHALL ""
rename-command FLUSHDB ""
rename-command CONFIG ""
